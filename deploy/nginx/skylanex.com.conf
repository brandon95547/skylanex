# skylanex.com — Skylanex static site (/var/www/skylanex). Forces https + www.
server {
    listen 80;
    listen [::]:80;
    server_name skylanex.com www.skylanex.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://www.skylanex.com$request_uri; }
}

# Non-www HTTPS -> www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name skylanex.com;

    ssl_certificate /etc/letsencrypt/live/skylanex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skylanex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.skylanex.com$request_uri;
}

# Canonical www HTTPS -> serve the static site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.skylanex.com;

    ssl_certificate /etc/letsencrypt/live/skylanex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skylanex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/skylanex;
    index index.html;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location = /api/contact {
        proxy_pass http://127.0.0.1:8000/contact;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / { try_files $uri $uri/ $uri.html =404; }
    error_page 404 /404.html;
    location ~* \.(css|js|svg|woff2?|png|jpe?g|webp|ico)$ { expires 7d; add_header Cache-Control "public"; }
}
