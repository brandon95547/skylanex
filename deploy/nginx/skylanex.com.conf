# skylanex.com — Skylanex static site (/var/www/skylanex). Forces https + www.
server {
    listen 80;
    listen [::]:80;
    server_name skylanex.com www.skylanex.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://www.skylanex.com$request_uri; }
}

# Non-www HTTPS -> www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name skylanex.com;

    ssl_certificate /etc/letsencrypt/live/skylanex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skylanex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.skylanex.com$request_uri;
}

# Canonical www HTTPS -> serve the static site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.skylanex.com;

    ssl_certificate /etc/letsencrypt/live/skylanex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skylanex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/skylanex/dist;
    index index.html;

    # Don't leak the nginx version (best set globally in http{} too).
    server_tokens off;

    # Security headers. `always` so they're sent on error responses (e.g. 404) too.
    # CSP is tuned to what the site actually loads: same-origin CSS/JS/media,
    # inline style="" attributes, and Google Fonts. No inline/executable scripts.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; media-src 'self'; connect-src 'self'" always;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location = /api/contact {
        proxy_pass http://127.0.0.1:8000/contact;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / { try_files $uri $uri/ $uri.html =404; }
    error_page 404 /404.html;
    # `expires` alone sets Cache-Control; no explicit add_header here so this
    # location keeps inheriting the security headers above (nginx drops inherited
    # add_headers from any location that declares its own).
    location ~* \.(css|js|svg|woff2?|png|jpe?g|webp|ico)$ { expires 7d; }
}
